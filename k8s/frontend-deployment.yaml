# ===========================================================
# LoanPro — Frontend Deployment (nginx)
# Replicas: 2 | Image: loan-frontend:latest | Port: 80
# Health: GET /healthz
# ===========================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: loan-system
  labels:
    app: loanpro
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: loanpro
      component: frontend
  template:
    metadata:
      labels:
        app: loanpro
        component: frontend
    spec:
      containers:
        - name: frontend
          image: loan-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
