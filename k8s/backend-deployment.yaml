# ===========================================================
# LoanPro — Backend Deployment
# Replicas: 2 | Image: loan-backend:latest | Port: 3000
# Health: GET /api/health
# ===========================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: loan-system
  labels:
    app: loanpro
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: loanpro
      component: backend
  template:
    metadata:
      labels:
        app: loanpro
        component: backend
    spec:
      containers:
        - name: backend
          image: loan-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: loanpro-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: loanpro-config
                  key: PORT
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: loanpro-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: loanpro-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: loanpro-config
                  key: DB_NAME
            - name: JWT_EXPIRES_IN
              valueFrom:
                configMapKeyRef:
                  name: loanpro-config
                  key: JWT_EXPIRES_IN
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: loanpro-config
                  key: CORS_ORIGIN
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: loanpro-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: loanpro-secret
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: loanpro-secret
                  key: JWT_SECRET
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
