# ===========================================================
# LoanPro — Frontend Service (NodePort)
# NodePort 30080 exposes the app on minikube's IP
# ===========================================================
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: loan-system
  labels:
    app: loanpro
    component: frontend
spec:
  type: NodePort
  selector:
    app: loanpro
    component: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
      protocol: TCP
