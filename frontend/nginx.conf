# =============================================================
#  LoanPro — Nginx Server Block
#
#  Responsibilities
#  ────────────────
#  • Serve every static HTML / CSS / JS asset from /usr/share/nginx/html
#  • Reverse-proxy any request that starts with /api → backend:3000
#  • SPA fallback: unknown paths return index.html (client-side routing)
#  • Gzip, caching, and security headers
# =============================================================

server {
    listen       80;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # ------------------------------------------------------------------
    # Security headers
    # ------------------------------------------------------------------
    add_header X-Frame-Options          "DENY"            always;
    add_header X-Content-Type-Options   "nosniff"         always;
    add_header X-XSS-Protection         "1; mode=block"   always;
    add_header Referrer-Policy          "same-origin"     always;

    # ------------------------------------------------------------------
    # Gzip compression
    # ------------------------------------------------------------------
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ------------------------------------------------------------------
    # Reverse proxy  →  /api/* forwarded to backend service
    # "backend" resolves via Docker's internal DNS to the backend container
    # ------------------------------------------------------------------
    location /api {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;

        # Needed for keep-alive connections
        proxy_set_header   Connection        "";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout  10s;
        proxy_send_timeout     30s;
        proxy_read_timeout     30s;

        # Surface upstream errors as-is (JSON from Express)
        proxy_intercept_errors off;
    }

    # ------------------------------------------------------------------
    # Static assets — long-lived cache
    # ------------------------------------------------------------------
    location ~* \.(css|js|ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$ {
        expires        1y;
        add_header     Cache-Control "public, immutable";
        access_log     off;
    }

    # ------------------------------------------------------------------
    # SPA catch-all — non-file URLs return index.html so the JS router
    # handles the route rather than nginx returning 404.
    # ------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ------------------------------------------------------------------
    # Healthcheck endpoint for Docker / load-balancers
    # ------------------------------------------------------------------
    location /healthz {
        access_log  off;
        return      200 "OK\n";
        add_header  Content-Type text/plain;
    }
}
